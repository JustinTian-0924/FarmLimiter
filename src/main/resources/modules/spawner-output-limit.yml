# Whether the spawner output limit module is enabled.
enabled: true
debug:
  # Whether spawner debug logs are enabled.
  enabled: false
  # Log every spawner spawn attempt.
  log-spawn-attempts: false
  # Log when a spawner spawn is cancelled because resource is empty.
  log-cancelled-spawns: true
  # Log when plugin applies vanilla spawner behavior settings.
  log-apply-settings: false
# Default resource settings for all spawners.
default:
  # Resource amount given to a newly placed or newly discovered spawner.
  initial-resource: 250

  # Maximum resource this spawner can regenerate to.
  max-resource: 1000

  # Amount of resource restored each regeneration cycle.
  regen-amount: 2

  # Seconds between each regeneration cycle.
  regen-interval-seconds: 90
resource-regen:
  # Whether spawner resource should regenerate while the spawner chunk is unloaded.
  # If true, elapsed real time is counted when the spawner data is loaded again.
  regen-while-chunk-unloaded: true
  # Whether spawner resource should regenerate while the chunk is loaded,
  # but the spawner is not active because no player is within required-player-range.
  regen-while-inactive-loaded: true
  #Notify player in certain raidus when the spawner is depleated
notify:
  empty-actionbar:
    enabled: true
    radius: 16
    cooldown-seconds: 300
behavior:
  # Whether this module should apply custom vanilla spawner settings.
  apply-settings: true
  # Required player range in blocks for the spawner to activate.
  required-player-range: 24
  # Spawn range in blocks around the spawner.
  spawn-range: 4
  # Number of mobs the spawner tries to spawn each cycle.
  spawn-count-min: 1
  spawn-count-max: 4
  # Minimum seconds between spawn attempts.
  min-spawn-delay-seconds: 10
  # Maximum seconds between spawn attempts.
  max-spawn-delay-seconds: 30
# Per-entity overrides.
# Entity names must use Bukkit EntityType names, such as ZOMBIE, SKELETON, CREEPER.
per-entity:
  ZOMBIE:
    initial-resource: 400
    max-resource: 1500
    regen-amount: 3
    regen-interval-seconds: 90
    behavior:
      required-player-range: 24
      spawn-range: 4
      spawn-count-min: 2
      spawn-count-max: 6
      min-spawn-delay-seconds: 10
      max-spawn-delay-seconds: 30

  SKELETON:
    initial-resource: 250
    max-resource: 1000
    regen-amount: 2
    regen-interval-seconds: 90

cleanup:
  # Whether full spawner records should be removed from memory and storage cleanup.
  # Keep this false if you want full spawners to stay recorded.
  unload-when-full: false

  # Seconds before an inactive spawner record can be removed from memory.
  inactive-ttl-seconds: 1800

storage:
  # Size of each region in chunks.
  # Spawner records are tracked individually, but saved into regional files.
  region-size-chunks: 32

  # Whether empty saved regions should be unloaded from memory after saving.
  unload-empty-regions-after-save: true

  # Maximum number of regions kept in memory.
  # Set to 0 to disable this limit.
  max-loaded-regions: 128

  # Whether clean inactive regions should be unloaded from memory.
  unload-inactive-loaded-regions: true

  # Seconds before a clean loaded region is considered inactive.
  loaded-region-inactive-ttl-seconds: 900

  # Maximum number of regions that can be unloaded during one cleanup pass.
  max-region-unloads-per-cleanup: 8
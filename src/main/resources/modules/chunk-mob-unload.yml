enabled: true

limits:
  total:
    soft: 256
    hard: 384

  groups:
    farm_animal:
      soft: 128
      hard: 192
      entities:
        - CHICKEN
        - PIG
        - COW
        - SHEEP
        - RABBIT
        - GOAT
        - ALLAY
        - VILLAGER

    hostile:
      soft: 128
      hard: 256
      entities:
        - ZOMBIE
        - SKELETON
        - CREEPER
        - SPIDER
        - ENDERMAN
        - BLAZE

  per-entity:
    ZOMBIE:
      soft: 64
      hard: 128
    SKELETON:
      soft: 64
      hard: 128
    CREEPER:
      soft: 64
      hard: 128
    COW:
      soft: 48
      hard: 64
    SHEEP:
      soft: 48
      hard: 64
    CHICKEN:
      soft: 72
      hard: 96
    VILLAGER:
      soft: 24
      hard: 32

over-soft-limit:
  # Whether natural mob spawning should be blocked when the chunk is over soft limit.
  block-natural-spawn: true

  # Reserved for later steps.
  block-breeding: true
  block-spawner: true
  block-spawn-egg: true

check:
  # How often loaded chunks are checked for hard-limit cleanup.
  interval-seconds: 900
cleanup:
  # FIXED, TOTAL_PERCENT, EXCESS_PERCENT, ALL_EXCESS, ALL
  remove-mode: "EXCESS_PERCENT"
  # Meaning depends on remove-mode.
  # FIXED: remove this many.
  # TOTAL_PERCENT: remove this percent of total matching entities.
  # EXCESS_PERCENT: remove this percent of entities over hard limit.
  remove-value: 10
  # Whether named entities can be removed.
  remove-named-entities: false
  # Whether tamed entities can be removed.
  remove-tamed-entities: false
  # Reserved for later steps.
  # NORMAL_FIRST, NAMED_SECOND, TAMED_LAST
  priority-mode: "NORMAL_FIRST"

debug:
  enabled: false
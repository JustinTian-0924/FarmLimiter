enabled: true

limits:
  total:
    soft: 256
    hard: 384

  groups:
    farm_animal:
      soft: 128
      hard: 192
      entities:
        - CHICKEN
        - PIG
        - COW
        - SHEEP
        - RABBIT
        - GOAT
        - ALLAY
        - VILLAGER

    hostile:
      soft: 128
      hard: 256
      entities:
        - ZOMBIE
        - SKELETON
        - CREEPER
        - SPIDER
        - ENDERMAN
        - BLAZE

  per-entity:
    ZOMBIE:
      soft: 64
      hard: 128
    SKELETON:
      soft: 64
      hard: 128
    CREEPER:
      soft: 64
      hard: 128
    COW:
      soft: 48
      hard: 64
    SHEEP:
      soft: 48
      hard: 64
    CHICKEN:
      soft: 72
      hard: 96
    VILLAGER:
      soft: 24
      hard: 32

over-soft-limit:
  # Whether natural mob spawning should be blocked when the chunk is over soft limit.
  block-natural-spawn: true

  # Reserved for later steps.
  block-breeding: true
  block-spawner: true
  block-spawn-egg: true

check:
  # How often loaded chunks are checked for hard-limit cleanup.
  interval-seconds: 900
cleanup:
  # FIXED, TOTAL_PERCENT, EXCESS_PERCENT, ALL_EXCESS, ALL
  remove-mode: "EXCESS_PERCENT"
  remove-value: 50
  # Whether named entities can be removed as normal candidates.
  remove-named-entities: false
  # Whether tamed entities can be removed as normal candidates.
  remove-tamed-entities: false
  # Whether named entities can be removed only after normal entities are not enough.
  remove-named-entities-as-second-priority: true
  # Whether tamed entities can be removed only after normal entities are not enough.
  remove-tamed-entities-as-second-priority: false
  # NORMAL_FIRST, RANDOM, NEAREST_TO_CHUNK_CENTER, FARTHEST_FROM_CHUNK_CENTER, NEAREST_TO_PLAYER, FARTHEST_FROM_PLAYER
  sort-mode: "NORMAL_FIRST"
warning:
  # If players are near the chunk, warn first and clean on the next scan.
  enabled: true
  # Radius from chunk center.
  radius-blocks: 48
  # Prevent repeated warning spam for the same chunk.
  cooldown-seconds: 60

debug:
  enabled: false
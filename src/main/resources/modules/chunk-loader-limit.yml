enabled: true

ender-pearl:
  enabled: true
  max-lifetime-seconds: 3600
  only-player-thrown: true
  notify-owner-on-remove: true

portal-entity:
  enabled: true

  minecart:
    enabled: true
    max-portal-teleports: 16
    convert-to-item: true

  boat:
    enabled: true
    max-portal-teleports: 16
    convert-to-item: true

  item:
    enabled: true
    max-portal-teleports: 8
    remove-on-exceed: true

  living-entity:
    enabled: false
    max-portal-teleports: 16
    remove-on-exceed: false

check:
  interval-seconds: 60

world-filter:
  # BLACKLIST or WHITELIST
  mode: "BLACKLIST"
  # BLACKLIST: worlds here are ignored.
  # WHITELIST: only worlds here are checked.
  worlds:
    - "example_disabled_world"
entity-filter:
  # Entity types that portal teleport limit will ignore.
  ignored-types:
    - "VILLAGER"
    - "WOLF"
    - "CAT"
notify:
  admin-on-portal-limit: true
  admin-radius-blocks: 48
status:
  nearby-radius-blocks: 64
debug:
  enabled: false
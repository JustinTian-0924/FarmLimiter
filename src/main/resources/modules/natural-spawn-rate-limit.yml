# Whether the natural spawn rate limit module is enabled.
enabled: true
debug:
  # Whether natural spawn debug logging is enabled.
  enabled: false
  # Whether all creature spawn events should be logged.
  # This can spam the console on busy servers.
  log-all-creature-spawns: false
  # Whether ignored spawn reasons should be logged.
  log-ignored-spawn-reasons: true
  # Whether successful resource consumption should be logged.
  log-consume: true
  # Whether cancelled natural spawns should be logged.
  log-cancel: true
# Spawn reasons affected by this module.
# If this list is empty, only NATURAL spawns are limited.
limited-spawn-reasons:
  - NATURAL
  - BREEDING
  - RAID
  - PATROL
  - VILLAGE_DEFENSE
  - VILLAGE_INVASION
  - NETHER_PORTAL
  - POTION_EFFECT
# - NATURAL: normal natural mob spawning
# - BREEDING: animal breeding, also includes shulker duplication in Bukkit docs
# - SLIME_SPLIT: slime splitting into smaller slimes
# - REINFORCEMENTS: zombie reinforcements
# - SILVERFISH_BLOCK: silverfish from infested blocks
# - RAID: raid mobs
# - PATROL: patrol mobs
# - POTION_EFFECT: mobs generated due to potion effect (oozing & infest)
# - VILLAGE_INVASION: zombie village invasion
# - VILLAGE_DEFENSE: iron golem village defense
# - NETHER_PORTAL: mobs created by nether portals
# - BEEHIVE: bees released from beehives / bee nests
# - DROWNED: drowned conversion spawn
# - INFECTION: zombie infecting villager
# - CURED: villager cured from zombie villager
# - METAMORPHOSIS: tadpole converting to frog
# - DUPLICATION: allay duplication in newer API docs
#
# Usually not recommended:
# - SPAWNER: handled by spawner-output-limit module
# - SPAWNER_EGG: player spawn eggs
# - EGG: chicken eggs
# - COMMAND: /summon command
# - CUSTOM: plugin-created mobs
total:
  # Maximum total spawn resource stored in each chunk.
  max-resource: 2000
  # Amount of total spawn resource restored each regeneration cycle.
  regen-amount: 128
  # Seconds between each total resource regeneration cycle.
  regen-interval-seconds: 120

# Per-entity natural spawn resource.
# If an entity type is not listed here, it only uses the total resource.
per-entity:
  ZOMBIE:
    # Maximum spawn resource for this entity in each chunk.
    max-resource: 80
    # Amount of entity resource restored each regeneration cycle.
    regen-amount: 8
    # Seconds between each entity resource regeneration cycle.
    regen-interval-seconds: 600

  SKELETON:

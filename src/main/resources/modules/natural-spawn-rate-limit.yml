enabled: true
cleanup:
  # If total resource and all recorded entity resources are full, remove the chunk data
  unload-when-full: true
  # If a chunk has no plugin activity for this many seconds, remove its data
  inactive-ttl-seconds: 1800
debug:
  enabled: false
  log-all-creature-spawns: false
  log-ignored-spawn-reasons: true
  log-consume: true
  log-cancel: true

# Which spawn reasons will be limited by this module.
# NATURAL = normal natural mob spawning
# POTION_EFFECT = mobs spawned by potion effects, such as oozing / infestation
# RAID = mobs spawned as part of a raid
limited-spawn-reasons:
  - NATURAL
  - POTION_EFFECT
  - RAID
  - VILLAGE_DEFENSE # Villager Iron Farm

# Total natural spawn resource for each chunk
total:
  max-resource: 2500
  regen-interval-seconds: 30
  regen-amount: 40

# Per-entity natural spawn resource.
# If an entity type is not listed here, it only uses the total resource.
